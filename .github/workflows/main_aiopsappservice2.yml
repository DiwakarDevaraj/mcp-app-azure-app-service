# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        working-directory: my-mcp-app
        run: npm install
      
      - name: Build TypeScript
        working-directory: my-mcp-app
        run: npx tsc
      
      - name: Copy package files for runtime
        run: |
          cp my-mcp-app/package.json my-mcp-app/dist/
      
      - name: Install production deps inside dist
        working-directory: my-mcp-app/dist
        run: npm install --production
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: AIOpsAppService2
          package: my-mcp-app/dist
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
